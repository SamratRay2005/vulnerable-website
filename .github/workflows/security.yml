name: Security Scan (SAST)

on: [push, pull_request]

jobs:
  bandit-scan:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 to resolve deprecation warnings in the runner
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Bandit Security Scan
        # Bandit will exit with code 1 if it finds vulnerabilities, failing the step
        run: bandit -r . -f html -o bandit_report.html

      - name: Archive Security Report
        # This ensures the report is uploaded even if the "Run Bandit" step fails
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit_report.html