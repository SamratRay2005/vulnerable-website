name: CI/CD Security and Code Analysis

on: [push, pull_request]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install bandit pylint
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Code Analysis (Linting)
        # Pylint checks for code quality, errors, and PEP8 compliance
        # We use --exit-zero to ensure style warnings don't stop the whole pipeline
        run: |
          pylint --exit-zero app/ main.py > code_analysis_report.txt

      - name: Run Security Checks (SAST)
        # Bandit checks specifically for security vulnerabilities
        run: bandit -r . -f html -o bandit_report.html

      - name: Archive Reports
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: security-and-analysis-reports
          path: |
            bandit_report.html
            code_analysis_report.txt